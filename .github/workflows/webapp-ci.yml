name: Webapp CI

on:
  push:
    paths:
      - "webapp/**"
      - ".github/workflows/webapp-ci.yml"
  pull_request:
    paths:
      - "webapp/**"
      - ".github/workflows/webapp-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
